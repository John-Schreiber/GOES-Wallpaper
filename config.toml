# Example configuration for goes_wallpaper.py
# Copy/edit this file (or pass --config path/to/other.toml) to change behavior
# without touching the script. Any key omitted here falls back to the script's
# built-in default; any CLI flag passed at runtime overrides both.
#
# Note on section order: a TOML array-of-tables ([[combos]] below) header swallows
# every plain `key = value` line that follows it until the next table header. To
# avoid that footgun, it's placed at the very end, after all the plain scalar
# settings — keep new scalar settings above it, not after.
#
# Overlays (graticule, cities, GeoJSON files, a live shell-command source) live in a
# separate file, overlays.toml, not here -- see OVERLAYS.md.

# --- Platform ---
# Which platform_base.WallpaperPlatform backend to use. "auto" (default) detects
# from sys.platform / XDG_CURRENT_DESKTOP, same as always. Set this explicitly only
# if that detection picks the wrong backend or fails (e.g. a KDE session whose
# XDG_CURRENT_DESKTOP/XDG_SESSION_DESKTOP isn't set the way Plasma normally sets it),
# or if there's no desktop shell at all (a headless box/container/CI) and you just
# want the rendered image(s) via render_to below -- "render" never applies a desktop
# wallpaper and is never chosen by "auto", so it must be set explicitly.
# platform = "kde"  # "auto" | "windows" | "kde" | "render"

# --- Source image ---
satellite = "GOES19"      # GOES19 (East) or GOES18 (West)
sector = "CONUS"          # CONUS | FD (Full Disk) | M1 | M2 (Mesoscale)
product = "GEOCOLOR"
# NOAA serves discrete sizes per sector, not an arbitrary resize. Verified for CONUS:
# 625x375, 1250x750, 2500x1500, 5000x3000, 10000x6000 (native ABI band-2 resolution).
# 5000x3000 comfortably covers a 4K (3840x2160) monitor even after a full-frame crop;
# bump to 10000x6000 if you crop aggressively (source_crop_*/combo crop_*) and want
# more headroom — at the cost of a much bigger download every cycle. Full Disk's tiers
# differ (verified: 1808x1808, 5424x5424, 10848x10848); Mesoscale untested.
resolution = "5000x3000"

# "cdn_jpg" (default) fetches NOAA STAR's pre-rendered JPG, as above. "satpy_raw"
# instead composites our own GeoColor-style image from raw ABI L1b bands (requires
# the `satpy-raw` install extra: `uv sync --extra satpy-raw`) -- no baked-in state
# lines/logo/fake city lights, and georeferenced overlays work on any sector, not
# just CONUS. `product`/`resolution` above are ignored for this source_kind.
# BANDWIDTH WARNING: downloads four raw band files every cycle (no cross-cycle
# caching) -- measured ~98MB for CONUS, considerably more for Full Disk (Band 2
# alone ~405MB natively). Logged every fetch (search logs for "Downloaded"). Think
# before enabling this at a tight interval_minutes, especially on a metered
# connection (metered_resolution can't help here). See README.md's "Custom
# raw-data source (satpy_raw)" section and CUSTOM_IMAGERY_PLAN.md.
# source_kind = "satpy_raw"
#
# "image_file" opens any Pillow-decodable image directly from image_path (a local
# path or an http(s) URL) instead of fetching from NOAA/AWS at all -- your own
# already-georeferenced imagery, a one-off test frame, etc. Whatever Pillow's
# installed plugins can open works, including plain TIFF/GeoTIFF pixel data --
# but GeoTIFF's embedded CRS/geotransform tags are NOT parsed (that would need
# rasterio/GDAL, not used here), so there's no georeferencing for this
# source_kind: source_crop_min_lon/etc. and output_projection fall back to the
# plain fractional crop, same as an uncalibrated cdn_jpg sector. `product`/
# `resolution` above are ignored, same as satpy_raw.
# source_kind = "image_file"
# image_path = "C:/path/to/image.png"  # or "https://example.com/image.tif"
source_kind = "cdn_jpg"

# --- Output ---
# data_dir = "C:/Users/you/AppData/Local/GOES-Wallpaper"  # defaults to that path already
wallpaper_style = "fill"  # fill | fit | stretch | tile | center | span
# set_lock_screen = true  # also apply the same image as the lock screen (Windows
                           # and KDE Plasma only so far; not supported with
                           # combo_mode = "per_monitor")
# render_to = "C:/Users/you/Desktop/test_render.jpg"  # save the rendered frame here
                           # and skip applying it as the wallpaper -- for testing
# overlay_cache_max_age_days = 30  # delete overlay_geojson_cache_*.png/.json pairs
                           # unused this many days (e.g. a removed/renamed
                           # geojson_sources entry) -- 0 disables pruning

# --- Screen handling ---
crop_to_screen = true
crop_anchor = 0.5         # 0.0 top/left .. 1.0 bottom/right bias when cropping
# screen_width = 1920      # uncomment to override auto-detected resolution
# screen_height = 1080
span_all_monitors = false # crop to the full virtual desktop instead of just the
                           # primary monitor; pair with wallpaper_style = "span"

# GetSystemMetrics reports a fake 1024x768 when the process has no interactive
# desktop (e.g. a "run whether user is logged on or not" scheduled task). WMI reads
# the video driver's current mode directly and isn't affected by that, so it's tried
# automatically before falling back to 1024x768. Only applies when span_all_monitors
# is false — spanning still needs an explicit screen_width/screen_height in that case.
wmi_screen_size_fallback = true

# NOAA bakes its own timestamp/caption strip into the bottom of the source image;
# trim it off before our crop/info-block overlay so it isn't half-cut or duplicated.
trim_source_caption = true
trim_source_caption_frac = 0.02

# Region-of-interest crop applied *before* the screen-fit cover-crop above, as
# fractions (0.0-1.0) of the caption-trimmed source image. Defaults to the full frame.
# Lets you frame a sub-region deliberately instead of the cover-crop's resize+crop
# discarding it unpredictably, and can trim off NOAA's logo watermark (bottom-left
# corner of every frame on this CDN). Note: it can only cut edges — it can't remove
# things baked in across the whole frame, like the state/country border lines NOAA
# overlays on every product (GEOCOLOR and the raw bands alike).
source_crop_left = 0.0
source_crop_top = 0.0
source_crop_right = 1.0
source_crop_bottom = 1.0

# Alternative to source_crop_left/top/right/bottom above: frame the region of
# interest by a lon/lat bounding box instead. All four must be set together; when set,
# this takes precedence over the fractional crop above. Requires georeferencing
# calibration for the resolved satellite/sector (CONUS/Full Disk on the default
# cdn_jpg source, any sector on satpy_raw) -- falls back to the fractional crop,
# logged, if calibration isn't available (e.g. Mesoscale on cdn_jpg).
# source_crop_min_lon = -112.0
# source_crop_min_lat = 33.0
# source_crop_max_lon = -105.0
# source_crop_max_lat = 40.0

# Reproject the rendered frame into a different map projection instead of the
# satellite's native GEOS view. See PROJECTIONS.md for example renders of each.
#
# Bounds-framed (use source_crop_min_lon/min_lat/max_lon/max_lat above -- required in
# these modes, those bounds become the reprojected output's extent, replacing rather
# than stacking with the region-of-interest crop):
#   "platecarree"      - equirectangular.
#   "lambertconformal" - conformal conic; the standard choice for a mid-latitude
#                        regional map (what NWS/NOAA's own CONUS maps use) --
#                        negligible distortion for a CONUS-sized box, unlike
#                        platecarree/mercator. Standard parallels default to 1/6 and
#                        5/6 up the box's latitude range; override with
#                        output_projection_lcc_lat1/_lcc_lat2 below for specific ones.
#
# Center-framed (use output_projection_center_lon/_center_lat below, defaulting to the
# resolved source's own satellite sub-point / the equator):
#   "orthographic"     - a globe view as seen from space; pixels beyond the visible
#                        hemisphere render black.
#   "lambertazimuthal" - equal-area azimuthal; shows nearly the whole globe (not just
#                        the visible hemisphere) without Mercator's polar blowup, at
#                        the cost of shape distortion far from center.
#
# "native" (default) means no reprojection. Not combo-overridable. Note: cdn_jpg's
# baked-in NOAA captions/borders warp along with everything else in any of these.
output_projection = "native"
# output_projection_center_lon = -95.0
# output_projection_center_lat = 25.0
# output_projection_lcc_lat1 = 33.0
# output_projection_lcc_lat2 = 45.0

# Georeferenced overlays (graticule, city/GeoJSON markers, a live shell-command
# GeoJSON source) moved out of this file -- see overlays.toml and OVERLAYS.md.

# --- Multi-source combos (optional) ---
# Define named source+crop presets and how to use them. Ignored entirely unless
# combo_mode is set below. Any field left unset on a combo falls back to the
# top-level satellite/sector/product/resolution above; crop_left/top/right/bottom
# always apply (default: no crop, same as source_crop_* above). crop_min_lon/min_lat/
# max_lon/max_lat are also available per combo, following source_crop_min_lon's
# fall-back-to-Config behavior rather than crop_left's always-active one.
# output_projection itself isn't combo-overridable -- see above.
#
# combo_mode:
#   "single"      (default) - combos below are ignored.
#   "rotate"      - cycle through combos one per cycle (state.json remembers where it
#                   left off), applied as a single wallpaper like "single" mode.
#   "per_monitor" - each combo's `monitor` (0-based, in the order Windows'
#                   IDesktopWallpaper enumerates monitors — not necessarily the same
#                   numbering as Display Settings) gets its own independently
#                   rendered+applied wallpaper. Every combo must set `monitor` in this
#                   mode, and each monitor with no assigned combo is left untouched.
#                   Monitors are fetched sequentially, so total cycle time scales with
#                   how many distinct combos are assigned.
combo_mode = "single"
# combos themselves (if combo_mode isn't "single") are defined via [[combos]] at the
# end of this file -- see the note at the top.

# --- Info block overlay ---
info_block = true
info_block_height_frac = 0.055
info_block_opacity = 160
# The wallpaper renders full-screen behind the taskbar, so a bar drawn at the very
# bottom edge gets clipped by it. avoid_taskbar nudges the bar up by the taskbar's
# actual live height (queried at render time) instead of a guessed constant.
avoid_taskbar = true

# --- Networking / retries ---
timeout_connect = 10.0
timeout_read = 30.0
max_retries = 5
backoff_factor = 1.5

# --- Scheduling (only used with --loop) ---
loop = false
interval_minutes = 5
align_to_clock = true
jitter_seconds = 3.0

# NOAA doesn't publish a new frame right on the clock boundary — there's a
# processing/CDN lag (typically tens of seconds). sync_to_capture_time learns that lag
# from each frame's actual capture time and schedules the next wake-up shortly after,
# instead of guessing at the raw boundary and often re-downloading the previous frame.
sync_to_capture_time = true
capture_offset_buffer_seconds = 20.0
# wait_for_fresh_capture retries within a single cycle (every fresh_retry_interval_seconds,
# up to max_fresh_wait_seconds total) if the download comes back with the same capture
# time as last cycle — i.e. the new frame just hasn't posted yet.
wait_for_fresh_capture = true
fresh_retry_interval_seconds = 15.0
max_fresh_wait_seconds = 90.0

# For Task Scheduler-style single-shot use (no --loop): if the trigger fires right at
# (or shortly before) the clock boundary and this source's publish phase has already
# been learned from a prior run, sleep once until shortly after the next frame should
# land instead of fetching immediately and relying on wait_for_fresh_capture's
# poll-and-retry above. No-op until a phase has been learned (first run after
# switching this on just fetches immediately, same as before). Capped by
# wait_for_sync_max_seconds so a Task Scheduler interval that doesn't match
# interval_minutes can't hang the task for most of a cycle. Also settable via
# --wait-for-sync. Harmless (near-zero wait) with --loop too, since run_loop's own
# inter-cycle scheduling already lands wake-ups at this same target.
wait_for_sync_time = false
wait_for_sync_max_seconds = 150.0

# --- Power/network-aware fallbacks (optional) ---
# Both go through the platform backend, which degrades to "unknown" gracefully on
# hardware/platforms that can't detect this — unknown is always treated as "not
# constrained," never as a guess to skip/downgrade on. Both off by default.
skip_on_battery = false        # skip the whole cycle if running on battery power
# metered_resolution = "1250x750"  # override `resolution` when the network is metered

# --- Misc ---
skip_if_unchanged = true
log_level = "INFO"

# --- Multi-source combos (array-of-tables; must come after every scalar setting
# above -- see the note at the top of this file) ---
# Example: rotate between GEOCOLOR and Clean IR on a single monitor.
# [[combos]]
# name = "geocolor"
# product = "GEOCOLOR"
#
# [[combos]]
# name = "clean_ir"
# product = "13"

# Example: a different source per monitor (requires combo_mode = "per_monitor").
# [[combos]]
# name = "primary_geocolor"
# product = "GEOCOLOR"
# monitor = 0
#
# [[combos]]
# name = "secondary_westcoast_zoom"
# satellite = "GOES18"
# crop_left = 0.5
# monitor = 1
